    +'</div>';
  if(terneros.length){
    html+='<div style="margin-bottom:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--txt3)">Seleccione terneros a destetar — <span id="dest-cnt" style="font-weight:400">0 sel.</span></div>'
      +'<div class="chip-bar"><button class="btn btn-s btn-sm" onclick="chipAll(\'dest-chips\',\'dest-cnt\')">Todos</button><button class="btn btn-s btn-sm" onclick="chipNone(\'dest-chips\',\'dest-cnt\')">Ninguno</button>'
      +'<button class="btn btn-xls btn-sm" onclick="showDesteteLoteModal()">&#8679; Cargar lote Excel</button></div>'
      +'<div class="chip-grid" id="dest-chips" style="max-height:200px;margin-bottom:14px">'+terneros.map(function(a){return'<span class="chip" data-id="'+a.id+'" title="'+(a.caravana?formatCaravana(a.caravana):'Sin car.')+' | '+(getCampo(a.campoId).nombre||'sin campo')+'" onclick="toggleChip(this,\'dest-chips\',\'dest-cnt\')">'+(a.caravana?formatCaravana(a.caravana):'<i>Sin car.</i>')+'</span>'}).join('')+'</div>'
      +'<div class="btns"><button class="btn btn-p" onclick="confirmarDestete()">&#10003; Confirmar destete</button>'
      +'<button class="btn btn-warn" onclick="promocionNoviembre()">&#8679; Promover Nov: Novillo -1 → Sobre Año</button></div>';
  } else {
    html+=empty('⊘','Sin terneros activos','Registre terneros o crias antes de realizar el destete.');
  }

  if(state.destetes.length){

function showDesteteLoteModal(){
  var overlay=document.createElement('div');overlay.id='dest-lote-ov';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1100;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML='<div style="background:#fff;border-radius:14px;width:480px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.2);overflow:hidden">'
    +'<div style="padding:12px 16px 10px;border-bottom:1px solid var(--brdf);font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center">Seleccionar terneros desde Excel<button style="background:none;border:none;font-size:20px;cursor:pointer" onclick="document.getElementById(\'dest-lote-ov\').remove()">&#215;</button></div>'
    +'<div style="padding:14px">'
    +'<div class="alert alert-info" style="font-size:12px">Suba un archivo con una columna <b>Caravana</b> (una caravana de ternero por fila)</div>'
    +'<div class="drop-zone" id="dz-dest" onclick="document.getElementById(\'fi-dest\').click()" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="handleDropDest(event)">'
    +'<div class="ico">&#128196;</div><h4>Clic o arrastre Excel / CSV</h4></div>'
    +'<input type="file" id="fi-dest" accept=".xlsx,.xls,.csv" style="display:none" onchange="processDestFile(this.files[0])">'
    +'<div id="dest-lote-msg"></div>'
    +'<div style="margin-top:10px;text-align:right"><button class="btn btn-s btn-sm" onclick="document.getElementById(\'dest-lote-ov\').remove()">Cerrar</button></div>'
    +'</div></div>';
  document.body.appendChild(overlay);
}
function handleDropDest(ev){ev.preventDefault();document.getElementById('dz-dest').classList.remove('drag');processDestFile(ev.dataTransfer.files[0])}
function processDestFile(file){
  if(!file)return;
  parseXLSX(file,function(err,rows){
    if(err){document.getElementById('dest-lote-msg').innerHTML='<div class="alert alert-err">Error: '+err.message+'</div>';return}
    var terneros=activosByCat(['Ternero/a']);
    var matched=0,notFound=[];
    rows.forEach(function(row){
      var car=normalizeCaravana(String(row[0]||''));
      if(!car||car.toLowerCase()==='caravana')return;
      var tern=terneros.find(function(a){return a.caravana===car});
      if(tern){
        var chip=document.querySelector('#dest-chips [data-id="'+tern.id+'"]');
        if(chip&&!chip.classList.contains('on')){chip.classList.add('on');matched++;}
      } else notFound.push(car);
    });
    var cnt=document.querySelectorAll('#dest-chips .chip.on').length;
    var dc=document.getElementById('dest-cnt');if(dc)dc.textContent=cnt+' sel.';
    document.getElementById('dest-lote-msg').innerHTML='<div class="alert '+(notFound.length?'alert-warn':'alert-ok')+'" style="margin-top:8px">'+matched+' terneros seleccionados'+(notFound.length?'. No encontrados: '+notFound.join(', '):'')+'</div>';
  });
}
function promocionNoviembre(){
  confirm2('¿Promover todos los "Novillo -1 Año" a "Novillo Sobre Año"? Esta acción es para el mes de noviembre.',function(){
    var fecha=fmtFecha(new Date());var n=0;
    state.animales.forEach(function(a){
      if((a.estado||'activo')==='activo'&&a.categoria==='Novillo -1 Año'){
        if(!a.histCat)a.histCat=[];
        a.histCat.push({de:'Novillo -1 Año',a:'Novillo Sobre Año',fecha:fecha,auto:false});
        a.categoria='Novillo Sobre Año';n++;
      }
    });
    save('animales');renderDestetes();toast(n+' animales promovidos a Novillo Sobre Año');
  },'Promover');
}
function confirmarDestete(){
  var sel=[].slice.call(document.querySelectorAll('#dest-chips .chip.on')).map(function(c){return c.dataset.id});
  if(!sel.length){toast('Seleccione al menos un ternero');return}
  confirm2('¿Destetar '+sel.length+' ternero(s)? Pasarán a categoría "Novillo -1 Año".',function(){
    var fecha=fmtFecha(new Date());
    sel.forEach(function(id){
      var a=getAnimal(id);if(!a)return;
      if(!a.histCat)a.histCat=[];
      a.histCat.push({de:a.categoria,a:'Novillo -1 Año',fecha:fecha,auto:false});
      a.categoria='Novillo -1 Año';
    });
    state.destetes.push({id:uid(),fecha:fecha,cantidad:sel.length,animalesIds:sel,obs:''});
    save('animales');save('destetes');renderDestetes();toast(sel.length+' terneros destete → Novillo -1 Año');
  },'Confirmar destete');
}

function newVacuna(){ _vacLoteId=null; openModal(vacunaModal()); }
function editVacuna(id){
  _vacLoteId = id;
  openModal(vacunaModal(state.vacunas.find(function(v){return v.id===id;})));
}

function saveVacuna(){
  var lote = document.getElementById('v-lot').value.trim();
  var fec  = document.getElementById('v-fec').value;
  if(!lote||!fec){ toast('Complete lote y fecha'); return; }
  var eid = document.getElementById('eid');
  var obj = {
    lote:lote, fecha:fec, vacuna:gv('v-vac'),
    nombre:document.getElementById('v-nom').value.trim(),
    dosis:document.getElementById('v-dos').value,
    lab:document.getElementById('v-lab').value,
    obs:document.getElementById('v-obs').value,
    animalesIds: eid
      ? (state.vacunas.find(function(v){return v.id===eid.value;})||{}).animalesIds||[]
      : []
  };
  if(eid){
    state.vacunas = state.vacunas.map(function(v){
      return v.id===eid.value ? Object.assign({},v,obj) : v;
    });
    _vacLoteId = eid.value;
  } else {
    var newV = Object.assign({id:uid()}, obj);
    state.vacunas.push(newV);
    _vacLoteId = newV.id;
  }
  save('vacunas');
  closeModal();
  // Go directly to the animal selection screen
  goPage('vacunas');
  renderVacAnimales(_vacLoteId);
}

// ── ANIMAL SELECTION PAGE for a lote ─────────────────────────────────────────
var _vacSearch = '', _vacCatF = '', _vacCamF = '';

function renderVacAnimales(loteId){
  var v = state.vacunas.find(function(x){return x.id===loteId;});
  if(!v){ renderVacunas(); return; }

  var activos = state.animales.filter(function(a){
    return (a.estado||'activo')==='activo';
  });

  // Filters
  var filtered = activos.filter(function(a){
    if(_vacSearch && !(a.caravana||'').toLowerCase().includes(_vacSearch)) return false;
    if(_vacCatF   && a.categoria !== _vacCatF)   return false;
    if(_vacCamF   && (getCampo(a.campoId).nombre||'') !== _vacCamF) return false;
    return true;
  });

  var selIds = v.animalesIds||[];
  var selCount = selIds.length;

  // Cat options
  var catOpts = '<option value="">Todas las categorías</option>'
    +CAT_NAMES.map(function(c){
      return '<option value="'+c+'"'+(_vacCatF===c?' selected':'')+'>'+c+'</option>';
    }).join('');

  // Campo options
  var camOpts = '<option value="">Todos los campos</option>'
    +state.campos.map(function(c){
      return '<option value="'+c.nombre+'"'+(_vacCamF===c.nombre?' selected':'')+'>'+c.nombre+'</option>';
    }).join('');

  // Build table rows
  var rows = filtered.length
    ? filtered.map(function(a){
        var on = selIds.indexOf(a.id) > -1;
        return '<tr class="'+(on?'vac-sel-row':'')+'" onclick="toggleVacAnimal(\''+loteId+'\',\''+a.id+'\')" style="cursor:pointer">'
          +'<td style="width:36px;text-align:center">'
            +'<input type="checkbox" '+(on?'checked':'')+' onclick="event.stopPropagation();toggleVacAnimal(\''+loteId+'\',\''+a.id+'\')" style="width:18px;height:18px;accent-color:var(--g600)">'
          +'</td>'
          +'<td class="mono" style="font-size:13px;font-weight:700">'+(a.caravana?formatCaravana(a.caravana):'<i style="color:var(--txt3)">Sin caravana</i>')+'</td>'
          +'<td>'+catBadge(a.categoria||'—')+'</td>'
          +'<td><span class="badge bgr">'+(a.raza||'—')+'</span></td>'
          +'<td>'+(getCampo(a.campoId).nombre||'—')+'</td>'
          +'<td>'+marcaBadge(a.marca)+'</td>'
          +'<td><button class="btn btn-s" style="padding:3px 8px;font-size:11px" onclick="event.stopPropagation();closeModal?closeModal():null;setTimeout(function(){verAnimal(\''+a.id+'\')},50)">Ver</button></td>'
          +'</tr>';
      }).join('')
    : '<tr class="no-data"><td colspan="6">'+empty('◎','Sin animales','Ajuste los filtros.')+'</td></tr>';

  document.getElementById('content').innerHTML =
    // Header con info del lote
    '<div class="panel" style="margin-bottom:12px"><div class="panel-hdr">'
    +'<div><h3>Seleccionar animales vacunados</h3>'
    +'<div style="font-size:12px;color:var(--txt3);margin-top:2px">'
    +'Lote <b>'+v.lote+'</b> · '+v.fecha+' · <b>'+(v.vacuna||'—')+'</b>'
    +(v.nombre?' ('+v.nombre+')':'')+'</div></div>'
    +'<div class="btns">'
    +'<button class="btn btn-s btn-sm" onclick="renderVacunas()">← Volver</button>'
    +'<button class="btn btn-p btn-sm" onclick="editVacuna(\''+loteId+'\')">Editar datos lote</button>'
    +'</div></div>'
    // Stats bar
    +'<div style="padding:10px 18px;background:var(--g50);border-top:1px solid var(--g100);display:flex;gap:16px;flex-wrap:wrap;align-items:center">'
    +'<span style="font-size:13px"><b id="vac-sel-cnt">'+selCount+'</b> animales seleccionados</span>'
    +'<span style="font-size:12px;color:var(--txt3)">'+activos.length+' activos en total</span>'
    +'<div style="flex:1"></div>'
    +'<button class="btn btn-p btn-sm" onclick="vacGuardarLote(\''+loteId+'\')" style="min-width:160px">✓ Guardar lote</button>'
    +'</div></div>'

    // Filters + import
    +'<div class="panel"><div class="panel-hdr" style="gap:8px;flex-wrap:wrap">'
    +'<div class="filters" style="flex:1;padding:0;border:none;background:none">'
    +'<div class="field"><input id="vac-s" value="'+_vacSearch+'" placeholder="🔍 Buscar caravana..." '
      +'oninput="_vacSearch=this.value.toLowerCase();renderVacAnimales(\''+loteId+'\')"></div>'
    +'<div class="field"><select onchange="_vacCatF=this.value;renderVacAnimales(\''+loteId+'\')">'+catOpts+'</select></div>'
    +'<div class="field"><select onchange="_vacCamF=this.value;renderVacAnimales(\''+loteId+'\')">'+camOpts+'</select></div>'
    +'</div>'
    +'<div class="btns" style="flex-shrink:0">'
    +'<button class="btn btn-s btn-sm" onclick="vacSelFiltrados(\''+loteId+'\')">✓ Sel. filtrados ('+filtered.length+')</button>'
    +'<button class="btn btn-s btn-sm" onclick="vacDeselTodos(\''+loteId+'\')">✗ Deseleccionar todos</button>'
    +'<button class="btn btn-xls btn-sm" onclick="vacShowImport(\''+loteId+'\')">↑ Importar Excel</button>'
    +'</div></div>'

    // Table
    +'<div class="tbl-wrap"><table><thead><tr>'
    +'<th style="width:36px"><input type="checkbox" id="vac-chk-all" '
      +'onchange="vacToggleAll(\''+loteId+'\',this.checked,'+JSON.stringify(filtered.map(function(a){return a.id;}))+')"> </th>'
    +'<th>N° Caravana</th><th>Categoría</th><th>Raza</th><th>Campo</th><th>Marca</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>'

    +'<button class="btn btn-p" onclick="vacGuardarLote(\''+loteId+'\')">✓ Guardar lote ('+selCount+' animales)</button>'
    +'</div></div>';
}

function toggleVacAnimal(loteId, animalId){
  var v = state.vacunas.find(function(x){return x.id===loteId;});
  if(!v) return;
  v.animalesIds = v.animalesIds||[];
  var idx = v.animalesIds.indexOf(animalId);
  if(idx > -1) v.animalesIds.splice(idx,1);
  else v.animalesIds.push(animalId);
  renderVacAnimales(loteId);
}

function vacToggleAll(loteId, checked, ids){
  var v = state.vacunas.find(function(x){return x.id===loteId;});
  if(!v) return;
  v.animalesIds = v.animalesIds||[];
  if(checked){
    ids.forEach(function(id){
      if(v.animalesIds.indexOf(id)===-1) v.animalesIds.push(id);
    });
  } else {
    v.animalesIds = v.animalesIds.filter(function(id){return ids.indexOf(id)===-1;});
  }
  renderVacAnimales(loteId);
}

function vacSelFiltrados(loteId){
  var activos = state.animales.filter(function(a){return (a.estado||'activo')==='activo';});
  var filtered = activos.filter(function(a){
    if(_vacSearch && !(a.caravana||'').toLowerCase().includes(_vacSearch)) return false;
    if(_vacCatF   && a.categoria !== _vacCatF)   return false;
    if(_vacCamF   && (getCampo(a.campoId).nombre||'') !== _vacCamF) return false;
    return true;
  });
  var v = state.vacunas.find(function(x){return x.id===loteId;});
  if(!v) return;
  v.animalesIds = v.animalesIds||[];
  filtered.forEach(function(a){
    if(v.animalesIds.indexOf(a.id)===-1) v.animalesIds.push(a.id);
  });
  renderVacAnimales(loteId);
}

function vacDeselTodos(loteId){
  var v = state.vacunas.find(function(x){return x.id===loteId;});
  if(!v) return;
  v.animalesIds = [];
  renderVacAnimales(loteId);
}

function vacGuardarLote(loteId){
  save('vacunas');
  var v = state.vacunas.find(function(x){return x.id===loteId;});
  var n = v ? (v.animalesIds||[]).length : 0;
  _vacSearch=''; _vacCatF=''; _vacCamF='';
  renderVacunas();
  toast('Lote guardado — '+n+' animales vacunados');
}

// ── IMPORT FROM EXCEL ─────────────────────────────────────────────────────────
function vacShowImport(loteId){

function vacHandleDrop(ev, loteId){
  ev.preventDefault();
  document.getElementById('dz-vac').style.borderColor='var(--brd)';
  vacProcessFile(ev.dataTransfer.files[0], loteId);
}

function vacProcessFile(file, loteId){
  if(!file) return;
  parseXLSX(file, function(err, rows){
    if(err){
      document.getElementById('vac-imp-msg').innerHTML =
        '<div class="alert alert-err">Error al leer el archivo: '+err.message+'</div>';
      return;
    }
    var activos = state.animales.filter(function(a){return (a.estado||'activo')==='activo';});
    var v = state.vacunas.find(function(x){return x.id===loteId;});
    if(!v) return;
    v.animalesIds = v.animalesIds||[];

    var matched=0, notFound=[], duplicate=0;
    // Find header row index (look for 'caravana' in first few rows)
    var startRow = 0;
    for(var ri=0; ri<Math.min(rows.length,5); ri++){
      var first = String(rows[ri][0]||'').trim().toLowerCase();
      if(first==='caravana'||first==='n° caravana'||first==='numero caravana'){
        startRow = ri+1; break;
      }
    }

    rows.slice(startRow).forEach(function(row){
      var car = normalizeCaravana(String(row[0]||''));
      if(!car||car.length<3) return;
      // Normalize: remove spaces from caravana
      var animal = activos.find(function(a){
        return (a.caravana||'').replace(/\s+/g,'')=== car;
      });
      if(animal){
        if(v.animalesIds.indexOf(animal.id)===-1){
          v.animalesIds.push(animal.id);
          matched++;
        } else {
          duplicate++;
        }
      } else {
        notFound.push(car);
      }
    });

    var msg = '<div class="alert '+(notFound.length?'alert-warn':'alert-ok')+'" style="margin-top:8px">';
    msg += '<b>'+matched+'</b> animales agregados al lote';
    if(duplicate>0) msg += ' · '+duplicate+' ya estaban seleccionados';
    if(notFound.length>0) msg += '<br><small style="color:var(--ad)">No encontrados ('+notFound.length+'): '
      +notFound.slice(0,10).join(', ')+(notFound.length>10?' ...y '+(notFound.length-10)+' más':'')+'</small>';
    msg += '</div>';
    document.getElementById('vac-imp-msg').innerHTML = msg;

    // Update the table behind the overlay
    var cnt = v.animalesIds.length;
    var cntEl = document.getElementById('vac-sel-cnt');
    if(cntEl) cntEl.textContent = cnt;
  });
}

// ── NORMALIZAR CARAVANAS ──────────────────────────────────────────────────────
// Removes spaces from all caravanas in state and syncs to Firebase
async function normalizarCaravanas(){
  if(!confirm('¿Eliminar los espacios en blanco de TODOS los números de caravana?\n\nEsto actualizará todos los animales en la base de datos.')) return;
  var fixed=0, skipped=0;
  // Track new caravanas to avoid duplicates after normalization
  var newCars={};
  state.animales.forEach(function(a){
    if(!a.caravana) return;
    var clean = normalizeCaravana(a.caravana);
    if(clean !== a.caravana){
      if(newCars[clean]){
        // Would create duplicate — skip
        skipped++;
        return;
      }
      newCars[clean]=true;
      a.caravana = clean;
      saveItem('animales', a);
      fixed++;
    } else {
      newCars[a.caravana]=true;
    }
  });
  if(fixed>0) renderAnimales();
  toast(fixed+' caravanas normalizadas'+(skipped>0?' · '+skipped+' omitidas (duplicado)':''));
}

    return;
  }

  var rows = entoresConVacas.map(function(e){
    var macho = getAnimal(e.machoId);
    var nVacas = (e.vacasIds||[]).length;
    var pars = state.pariciones.filter(function(p){return p.entoreId===e.id;});
    var nParto   = pars.filter(function(p){return p.resultado==='parto';}).length;
    var nMuerto  = pars.filter(function(p){return p.resultado==='ternero_muerto';}).length;
    var nNoPren  = pars.filter(function(p){return p.resultado==='no_prenia';}).length;

      +'<td>'
        +'<span class="badge bg" style="margin:1px">✓ '+nParto+'</span>'
        +'<span class="badge br" style="margin:1px">✗ '+nMuerto+'</span>'
        +'<span class="badge bb" style="margin:1px">○ '+nNoPren+'</span>'
        +(nPend>0?'<span class="badge" style="margin:1px;background:var(--a50);color:var(--a600)">□ '+nPend+' pend.</span>':'')
      +'</td>'
      +'<td><button class="btn btn-p btn-sm" onclick="verResultadoEntore(\''+e.id+'\')">Cargar resultados</button></td>'
      +'</tr>';

    +'<div class="tbl-wrap"><table><thead><tr>'

    +'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';

function verResultadoEntore(entoreId){
  var e = state.entores.find(function(x){return x.id===entoreId;});
  if(!e) return;
  var macho = getAnimal(e.machoId);

  var rows = (e.vacasIds||[]).map(function(vid){
    var vaca = getAnimal(vid);
    if(!vaca) return '';
    var par = state.pariciones.find(function(p){return p.entoreId===entoreId&&p.vacaId===vid;});
    var res = par ? par.resultado : '';
    var obsVal = par ? (par.obs||'') : '';

    var btns = ['parto','ternero_muerto','no_prenia'].map(function(r){
      var lbls = {parto:'✓ Parto', ternero_muerto:'✗ T.Muerto', no_prenia:'○ No preñada'};
      var cols = {parto:'btn-p', ternero_muerto:'btn-d', no_prenia:'btn-s'};
      return '<button class="btn '+cols[r]+' btn-sm'+(res===r?' active-res':'')+'" '
        +'style="'+(res===r?'box-shadow:0 0 0 2px var(--g600);':'opacity:.6;')+'" '
        +'onclick="setParResult(\''+entoreId+'\',\''+vid+'\',\''+r+'\')">'+lbls[r]+'</button>';
    }).join('');
    return '<tr id="par-row-'+vid+'">'
      +'<td class="mono" style="font-weight:700">'+(vaca.caravana?formatCaravana(vaca.caravana):'—')+'</td>'
      +'<td>'+catBadge(vaca.categoria||'—')+'</td>'
      +'<td><div class="btns" style="gap:4px">'+btns+'</div></td>'
      +'<td><input value="'+obsVal+'" placeholder="Obs..." style="width:100%;font-size:12px;padding:4px 6px;border:1px solid var(--brd);border-radius:5px" '
        +'onchange="setParObs(\''+entoreId+'\',\''+vid+'\',this.value)"></td>'
      +'</tr>';
  }).join('');

  document.getElementById('content').innerHTML =
    '<div class="panel" style="margin-bottom:10px"><div class="panel-hdr">'
    +'<div><h3>Resultado de parición</h3>'
    +'<div style="font-size:12px;color:var(--txt3);margin-top:2px">'
    +'Toro: <b>'+(macho?macho.caravana:'—')+'</b> · Inicio: '+(e.fechaInicio||'—')
    +(e.fechaFin?' · Fin: '+e.fechaFin:'')+'</div></div>'
    +'<button class="btn btn-s btn-sm" onclick="renderPariciones()">← Volver</button>'
    +'</div></div>'
    +'<div class="panel"><div class="panel-hdr"><h3>Hembras del entore</h3>'
    +'<span style="font-size:12px;color:var(--txt3)">'+(e.vacasIds||[]).length+' animales</span>'
    +'</div>'
    +'<div class="tbl-wrap"><table><thead><tr>'
    +'<th>Caravana</th><th>Categoría</th><th>Resultado</th><th>Observaciones</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'<div style="padding:12px 18px;border-top:1px solid var(--brdf);display:flex;justify-content:flex-end">'
    +'<button class="btn btn-p" onclick="renderPariciones()">✓ Listo</button>'
    +'</div></div>';
}

function setParResult(entoreId, vacaId, resultado){
  var par = state.pariciones.find(function(p){return p.entoreId===entoreId&&p.vacaId===vacaId;});
  if(par){
    // Toggle off if same result clicked again
    par.resultado = (par.resultado===resultado) ? '' : resultado;
    saveItem('pariciones', par);
  } else {
    par = {id:uid(), entoreId:entoreId, vacaId:vacaId, resultado:resultado, obs:''};
    state.pariciones.push(par);
    saveItem('pariciones', par);
  }
  // Refresh just this row
  verResultadoEntore(entoreId);
}

function setParObs(entoreId, vacaId, obs){
  var par = state.pariciones.find(function(p){return p.entoreId===entoreId&&p.vacaId===vacaId;});
  if(par){
    par.obs = obs;
    saveItem('pariciones', par);
  } else {
    par = {id:uid(), entoreId:entoreId, vacaId:vacaId, resultado:'', obs:obs};
    state.pariciones.push(par);
    saveItem('pariciones', par);
  }
}

function buscarParaCambioCaravana(){
  var q = (document.getElementById('car-busq').value||'').toLowerCase().trim();
  var el = document.getElementById('car-results');
  if(!q){ el.innerHTML=''; return; }
  var found = state.animales.filter(function(a){
    return (a.caravana||'').toLowerCase().includes(q) && (a.estado||'activo')==='activo';
  }).slice(0,10);
  if(!found.length){ el.innerHTML='<p style="color:var(--txt3);font-size:13px">Sin resultados.</p>'; return; }
  el.innerHTML = found.map(function(a){
    return '<div style="display:flex;gap:10px;align-items:center;padding:10px;border:1px solid var(--brdf);border-radius:var(--rad);margin-bottom:8px;background:var(--card)">'
      +'<div style="flex:1">'
      +'<div style="font-family:monospace;font-weight:700;font-size:14px">'+(a.caravana||'S/C')+'</div>'
      +'<div style="font-size:12px;color:var(--txt3)">'+( a.categoria||'—')+' · '+(a.raza||'—')+'</div>'
      +'</div>'
      +'<input id="new-car-'+a.id+'" placeholder="UY 00000 0000" style="width:180px;padding:7px 10px;border:1.5px solid var(--brd);border-radius:var(--rad);font-family:monospace;font-size:13px" oninput="applyCaravanaMask(this)" maxlength="14">'
      +'<button class="btn btn-p btn-sm" onclick="aplicarCambioCaravana(\''+a.id+'\')">Cambiar</button>'
      +'</div>';
  }).join('');
}

function aplicarCambioCaravana(animalId){
  var inp = document.getElementById('new-car-'+animalId);
  var newCar = normalizeCaravana(inp?inp.value:'');
  if(!newCar){ toast('Ingrese la nueva caravana'); return; }
  // Check uniqueness
  var dup = state.animales.find(function(a){
    return a.id!==animalId && (a.caravana||'').replace(/\s+/g,'')=== newCar;
  });
  if(dup){ toast('Esa caravana ya está asignada a otro animal'); return; }
  var anim = state.animales.find(function(a){return a.id===animalId;});
  if(!anim) return;
  var oldCar = anim.caravana;
  anim.caravana = newCar;
  saveItem('animales', anim);
  toast('Caravana cambiada: '+oldCar+' → '+newCar);
  buscarParaCambioCaravana();
}

function loadMarcaImg(inp){
  var f=inp.files[0]; if(!f)return;
  if(f.size>1000000){toast('Imagen demasiado grande (máx 1MB)');return;}
  var r=new FileReader();
  r.onload=function(e){_marcaImgData=e.target.result;};
  r.readAsDataURL(f);
}
function newMarca(){ openModal(marcaModal()); }
function editMarca(id){
  var m = getMarcasList().find(function(x){return x.id===id;});
  openModal(marcaModal(m));
}
function saveMarca(){
  var nom = document.getElementById('mc-nom').value.trim();
  var ini = document.getElementById('mc-ini').value.trim().toUpperCase();
  if(!nom||!ini){ toast('Complete nombre e iniciales'); return; }
  var obs = document.getElementById('mc-obs').value.trim();
  var eid = document.getElementById('eid');
  var img = _marcaImgData || (eid?(getMarca(eid.value)||{}).img||'':'');
  var obj = { nombre:nom, iniciales:ini, obs:obs, img:img };
  if(eid){
    var editId = eid.value;
    if(!state.marcas||!state.marcas.length){
      state.marcas = MARCAS_DEFAULT.map(function(m){return Object.assign({},m);});
    }
    var exists = state.marcas.some(function(m){return m.id===editId;});
    if(exists){
      state.marcas = state.marcas.map(function(m){return m.id===editId?Object.assign({},m,obj):m;});
    } else {
      state.marcas.push(Object.assign({id:editId},obj));
    }
    var updated = state.marcas.find(function(m){return m.id===editId;});
    if(updated) saveItem('marcas', updated);
  } else {
    var newM = Object.assign({id:uid()},obj);
    if(!state.marcas||!state.marcas.length){
      state.marcas = MARCAS_DEFAULT.map(function(m){return Object.assign({},m);});
    }
    state.marcas.push(newM);
    saveItem('marcas', newM);
  }
  save('marcas'); closeModal(); renderMarcas(); toast('Marca guardada');
}

function razaModal(r){
  r=r||{};

    +'<button class="close-x" onclick="closeModal()">&#215;</button></div>'

    +'<div class="field"><label>Sigla</label><input id="rz-sig" value="'+(r.sigla||'')+'" placeholder="Ej: HE, RA" maxlength="10" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>'
    +'<div class="field"><label>Nombre completo</label><input id="rz-nom" value="'+(r.nombre||'')+'" placeholder="Ej: Hereford, Angus"></div>'
    +'</div></div>'

function newRaza(){ openModal(razaModal()); }
function editRaza(id){
  var r=getRazasList().find(function(x){return x.id===id;});
  openModal(razaModal(r));
}
function saveRaza(){
  var sig=document.getElementById('rz-sig').value.trim().toUpperCase();
  var nom=document.getElementById('rz-nom').value.trim();
  if(!sig||!nom){toast('Complete sigla y nombre');return;}
  var obj={sigla:sig,nombre:nom};
  var eid=document.getElementById('eid');
  if(eid){
    var editId=eid.value;
    if(!state.razas||!state.razas.length){
      state.razas=RAZAS_DEFAULT.map(function(r){return Object.assign({},r);});
    }
    var exists=state.razas.some(function(r){return r.id===editId;});
    if(exists){
      state.razas=state.razas.map(function(r){return r.id===editId?Object.assign({},r,obj):r;});
    } else {
      state.razas.push(Object.assign({id:editId},obj));
    }
    var updated=state.razas.find(function(r){return r.id===editId;});
    if(updated) saveItem('razas',updated);
  } else {
    if(getRazasList().some(function(r){return r.sigla===sig;})){toast('Ya existe esa sigla');return;}
    var newR=Object.assign({id:uid()},obj);
    if(!state.razas||!state.razas.length){
      state.razas=RAZAS_DEFAULT.map(function(r){return Object.assign({},r);});
    }
    state.razas.push(newR);
    saveItem('razas',newR);
  }
  RAZAS_OBJ=getRazasList().map(function(r){return{v:r.sigla,l:r.sigla+' — '+r.nombre};});
  RAZAS=getRazasList().map(function(r){return r.sigla;});
  save('razas'); closeModal(); renderRazas(); toast('Raza guardada');
}
function delRaza(id){
  confirm2('¿Eliminar esta raza?',function(){
    deleteItem('razas',id);
    state.razas=state.razas.filter(function(r){return r.id!==id;});
    RAZAS_OBJ=getRazasList().map(function(r){return{v:r.sigla,l:r.sigla+' — '+r.nombre};});
    RAZAS=getRazasList().map(function(r){return r.sigla;});
    save('razas'); renderRazas(); toast('Raza eliminada');
  },'Eliminar');
}

function exportarReporte(){

    r.onload=function(e){LEC.photos.push({dataUrl:e.target.result,base64:e.target.result.split(',')[1],mediaType:f.type||'image/jpeg'});renderLector();};

  });

  if(!LEC.apiKey){toast('Configure la clave API primero');return;}
  if(!LEC.photos.length){toast('Suba al menos una foto');return;}
  var sch=LEC.SCHEMAS[LEC.type];
  var btn=document.getElementById('lec-proc-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Procesando...';}
  var prog=document.getElementById('lec-prog');
  if(prog)prog.style.display='block';
  lecSetProg(15); lecSetLbl('Enviando a Claude Vision...');
  try{
    var imgBlocks=LEC.photos.map(function(p){
      return{type:'image',source:{type:'base64',media_type:p.mediaType,data:p.base64}};
    });
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':LEC.apiKey,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8096,
        messages:[{role:'user',content:[...imgBlocks,
          {type:'text',text:sch.prompt+'\n\nRetorna SOLO el JSON puro, sin bloques markdown.'}]}]})


    });
    lecSetProg(75); lecSetLbl('Procesando respuesta...');
    if(!resp.ok){var e=await resp.json();throw new Error((e.error&&e.error.message)||'HTTP '+resp.status);}
    var res=await resp.json();
    var txt=res.content[0].text.trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    lecSetProg(90); lecSetLbl('Generando tabla...');
    LEC.extracted=JSON.parse(txt);
    lecSetProg(100); lecSetLbl('');
  }catch(e){
    LEC.extracted={_error:e.message};
    toast('Error: '+e.message,4000);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='🤖 Leer planilla y extraer datos';}
    setTimeout(function(){if(prog)prog.style.display='none';lecSetProg(0);},700);
    renderLector();
  }
}

    XLSX.utils.book_append_sheet(wb,ws0,'Entore_Info');

    XLSX.utils.book_append_sheet(wb,ws1,'Animales_Vacunados');

function handleDropCom(ev){ev.preventDefault();document.getElementById('dz-com').classList.remove('drag');processComFile(ev.dataTransfer.files[0]);}
function descargarPlantillaCompras(){
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet([
    ['Caravana','Categoría','Raza','Campo','Feria/Origen','Precio','Peso','Fecha'],
    ['UY00000 0000','Novillo 1-2','HE','','Feria de Durazno','25000','280','2026-01-15'],
  ]);
  ws['!cols']=[{wch:18},{wch:16},{wch:10},{wch:14},{wch:20},{wch:10},{wch:8},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,'Compras');
  XLSX.writeFile(wb,'plantilla_compras.xlsx');
}
function processComFile(file){
  if(!file)return;
  parseXLSX(file,function(err,rows){
    if(err){document.getElementById('imp-com-result').innerHTML='<div class="alert alert-err">Error al leer archivo: '+err.message+'</div>';return}
    var hRow=-1;
    for(var i=0;i<rows.length;i++){var r=rows[i];for(var j=0;j<r.length;j++){if(String(r[j]||'').toLowerCase().indexOf('caravana')>-1){hRow=i;break}}if(hRow>-1)break}
    if(hRow===-1){document.getElementById('imp-com-result').innerHTML='<div class="alert alert-err">No se encontró columna "Caravana".</div>';return}
    var hdrs=rows[hRow].map(function(h){return String(h||'').trim().toLowerCase()});
    var ci={car:findCol(hdrs,['caravana']),cat:findCol(hdrs,['categoría','categoria']),
      raza:findCol(hdrs,['raza']),campo:findCol(hdrs,['campo']),
      feria:findCol(hdrs,['feria','origen']),precio:findCol(hdrs,['precio']),
      peso:findCol(hdrs,['peso']),fecha:findCol(hdrs,['fecha'])};
    _impCom=[];
    rows.slice(hRow+1).forEach(function(row){
      var car=normalizeCaravana(ci.car>-1?String(row[ci.car]||''):'');
      if(!car||car.length<3)return;
      var campoNom=ci.campo>-1?String(row[ci.campo]||'').trim():'';
      var campoObj=state.campos.find(function(c){return c.nombre.toLowerCase()===campoNom.toLowerCase();});
      _impCom.push({
        caravana:car,
        categoria:ci.cat>-1?String(row[ci.cat]||'').trim():'',
        raza:ci.raza>-1?String(row[ci.raza]||'').trim():'',
        campoId:campoObj?campoObj.id:'',
        campoNom:campoNom,
        feria:ci.feria>-1?String(row[ci.feria]||'').trim():'',
        precio:ci.precio>-1?String(row[ci.precio]||'').trim():'',
        peso:ci.peso>-1?String(row[ci.peso]||'').trim():'',
        fecha:ci.fecha>-1?String(row[ci.fecha]||'').trim():'',
      });
    });
    renderComPreview();
  });
}
function renderComPreview(){
  var el=document.getElementById('imp-com-result');
  if(!_impCom.length){el.innerHTML='<div class="alert alert-warn">Sin filas válidas para importar.</div>';return;}
  el.innerHTML='<div class="alert alert-ok">'+_impCom.length+' compras listas para importar.</div>'
    +'<div class="tbl-wrap" style="max-height:260px"><table><thead><tr><th>Caravana</th><th>Categoría</th><th>Campo</th><th>Feria</th><th>Precio</th></tr></thead><tbody>'
    +_impCom.map(function(r){return'<tr><td class="mono">'+formatCaravana(r.caravana)+'</td><td>'+(r.categoria||'—')+'</td><td>'+(r.campoNom||'—')+'</td><td>'+(r.feria||'—')+'</td><td>'+(r.precio||'—')+'</td></tr>';}).join('')
    +'</tbody></table></div>';
  document.getElementById('btn-imp-com').style.display='inline-flex';
}
function doImportCom(){
  var count=0;
  _impCom.forEach(function(r){
    var obj={fecha:r.fecha,caravana:r.caravana,categoria:r.categoria,raza:r.raza,
      campoId:r.campoId,feria:r.feria,precio:r.precio,peso:r.peso};
    var nc=Object.assign({id:uid()},obj);
    state.compras.push(nc);
    saveItem('compras',nc);
    state.animales.push({id:uid(),caravana:r.caravana,categoria:r.categoria,raza:r.raza,
      campoId:r.campoId,estado:'activo',peso:r.peso,obs:'Importado — compra en '+(r.feria||'feria')});
    count++;
  });
  save('animales');save('compras');
  closeModal();renderCompras();toast(count+' compras importadas');
}

function processVtaFile(file){
  if(!file)return;
  parseXLSX(file,function(err,rows){
    if(err){document.getElementById('imp-vta-result').innerHTML='<div class="alert alert-err">Error al leer archivo: '+err.message+'</div>';return}
    var hRow=-1;
    for(var i=0;i<rows.length;i++){var r=rows[i];for(var j=0;j<r.length;j++){if(String(r[j]||'').toLowerCase().indexOf('caravana')>-1){hRow=i;break}}if(hRow>-1)break}
    if(hRow===-1){document.getElementById('imp-vta-result').innerHTML='<div class="alert alert-err">No se encontró columna "Caravana".</div>';return}
    var hdrs=rows[hRow].map(function(h){return String(h||'').trim().toLowerCase()});
    var ci={car:findCol(hdrs,['caravana']),precio:findCol(hdrs,['precio']),
      peso:findCol(hdrs,['peso']),comprador:findCol(hdrs,['comprador']),
      feria:findCol(hdrs,['feria','local']),fecha:findCol(hdrs,['fecha'])};
    var activos=state.animales.filter(function(a){return(a.estado||'activo')==='activo';});
    _impVta=[];
    var notFound=[];
    rows.slice(hRow+1).forEach(function(row){
      var car=normalizeCaravana(ci.car>-1?String(row[ci.car]||''):'');
      if(!car||car.length<3)return;
      var animal=activos.find(function(a){return normalizeCaravana(a.caravana)===car;});
      if(!animal){notFound.push(car);return;}
      _impVta.push({
        animalId:animal.id,caravana:animal.caravana,categoria:animal.categoria,
        precio:ci.precio>-1?String(row[ci.precio]||'').trim():'',
        peso:ci.peso>-1?String(row[ci.peso]||'').trim():'',
        comprador:ci.comprador>-1?String(row[ci.comprador]||'').trim():'',
        feria:ci.feria>-1?String(row[ci.feria]||'').trim():'',
        fecha:ci.fecha>-1?String(row[ci.fecha]||'').trim():'',
      });
    });
    renderVtaPreview(notFound);
  });
}
function renderVtaPreview(notFound){
  var el=document.getElementById('imp-vta-result');
  var msg='';
  if(_impVta.length) msg+='<div class="alert alert-ok">'+_impVta.length+' ventas listas para importar.</div>';
  if(notFound&&notFound.length) msg+='<div class="alert alert-warn">No encontrados ('+notFound.length+'): '+notFound.slice(0,8).join(', ')+(notFound.length>8?'…':'')+'</div>';
  if(!_impVta.length){el.innerHTML=msg||'<div class="alert alert-warn">Sin filas válidas.</div>';return;}
  el.innerHTML=msg
    +'<div class="tbl-wrap" style="max-height:260px"><table><thead><tr><th>Caravana</th><th>Precio</th><th>Comprador</th><th>Feria</th></tr></thead><tbody>'
    +_impVta.map(function(r){return'<tr><td class="mono">'+formatCaravana(r.caravana)+'</td><td>'+(r.precio||'—')+'</td><td>'+(r.comprador||'—')+'</td><td>'+(r.feria||'—')+'</td></tr>';}).join('')
    +'</tbody></table></div>';
  document.getElementById('btn-imp-vta').style.display='inline-flex';
}
function doImportVta(){
  var count=0;
  _impVta.forEach(function(r){
    var obj={fecha:r.fecha,animalId:r.animalId,caravana:r.caravana,categoria:r.categoria,
      precio:r.precio,peso:r.peso,comprador:r.comprador,feria:r.feria};
    var nv=Object.assign({id:uid()},obj);
    state.ventas.push(nv);
    saveItem('ventas',nv);
    var anim=state.animales.find(function(a){return a.id===r.animalId;});
    if(anim){anim.estado='vendido';saveItem('animales',anim);}
    count++;
  });
  save('ventas');
  closeModal();renderVentas();toast(count+' ventas importadas');
}

    }
  },{passive:true});
  // Visual Viewport API — best fix for iOS fixed elements during zoom
  if(window.visualViewport){
    function fixOnZoom(){
      var bn=document.getElementById('bottom-nav');
      var fab=document.getElementById('fab');
      var obn=document.getElementById('outdoor-btn');
      var vv=window.visualViewport;
      var offsetY=window.innerHeight-vv.height-vv.offsetTop;
      if(bn) bn.style.bottom=(offsetY+Math.max(0,window.innerHeight-vv.height-vv.offsetTop)+'px');
      if(fab) fab.style.bottom=(72+offsetY)+'px';
      if(obn) obn.style.bottom=(132+offsetY)+'px';
    }
    window.visualViewport.addEventListener('resize',fixOnZoom,{passive:true});
    window.visualViewport.addEventListener('scroll',fixOnZoom,{passive:true});
  }
})();

showAuthScreen();
</script>
